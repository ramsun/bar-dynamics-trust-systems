<svg width="100%" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">

  <rect width="900" height="260" fill="white"></rect>

  <!-- Title -->
  <text x="450" y="25" text-anchor="middle" font-size="16" font-family="Arial">
    Markov Trust Dynamics (Conceptual State Transitions)
  </text>

  <!-- Nodes -->
  <circle cx="150" cy="140" r="35" fill="none" stroke="black"></circle>
  <text x="150" y="145" text-anchor="middle" font-size="14">B</text>
  <text x="150" y="185" text-anchor="middle" font-size="11" fill="gray">Byzantine</text>

  <circle cx="450" cy="140" r="35" fill="none" stroke="black"></circle>
  <text x="450" y="145" text-anchor="middle" font-size="14">A</text>
  <text x="450" y="185" text-anchor="middle" font-size="11" fill="gray">Altruistic</text>

  <circle cx="750" cy="140" r="35" fill="none" stroke="black"></circle>
  <text x="750" y="145" text-anchor="middle" font-size="14">R</text>
  <text x="750" y="185" text-anchor="middle" font-size="11" fill="gray">Rational</text>

  <!-- Transitions -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="black"></path>
    </marker>
  </defs>

  <!-- B <-> A -->
  <line x1="185" y1="130" x2="415" y2="130" stroke="black" marker-end="url(#arrow)"></line>
  <line x1="415" y1="150" x2="185" y2="150" stroke="black" marker-end="url(#arrow)"></line>

  <!-- A <-> R -->
  <line x1="485" y1="130" x2="715" y2="130" stroke="black" marker-end="url(#arrow)"></line>
  <line x1="715" y1="150" x2="485" y2="150" stroke="black" marker-end="url(#arrow)"></line>

  <!-- Weak coupling B <-> R -->
  <line x1="185" y1="110" x2="715" y2="110" stroke="gray" stroke-dasharray="5" marker-end="url(#arrow)"></line>
  <line x1="715" y1="170" x2="185" y2="170" stroke="gray" stroke-dasharray="5" marker-end="url(#arrow)"></line>

</svg>